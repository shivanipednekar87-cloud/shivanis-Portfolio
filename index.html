<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Shivani Pednekar</title>
    <link rel="stylesheet" href="/src/style.scss" />
  </head>
  <body>
    <div id="app">
      <!-- HERO PAGE -->
      <div id="hero-screen">
        <canvas id="spline-hero"></canvas>

        <div id="hero-content">
          <p id="hero-label">Welcome</p>
          <h1 id="hero-name">Shivani Pednekar</h1>
         <p id="hero-tagline">3D Designer</p>

          <div id="hero-ornament">
            <div class="line"></div>
            <div class="dot"></div>
            <div class="line"></div>
          </div>

         

          <div id="hero-loading-wrap">
            <div id="hero-loading-percent">0%</div>
            <div id="hero-loading-line">
              <div id="hero-loading-bar"></div>
            </div>
            <div id="hero-loading-text">loading forest...</div>
          </div>
        </div>

        <!-- HERO LOADING OVERLAY -->
        <div id="hero-loading-overlay">
          
          <div id="overlay-loading-line">
            <div id="overlay-loading-bar"></div>
          </div>
          <div id="overlay-loading-percent">0%</div>
          <div id="overlay-loading-text">entering the forest...</div>
        </div>

        <!-- INSTRUCTION MODAL -->
        <div id="instruction-modal" aria-hidden="true">
          <div id="instruction-backdrop"></div>

          <div
            id="instruction-card"
            role="dialog"
            aria-modal="true"
            aria-labelledby="instruction-title"
          >
            <p id="instruction-title">How to Explore</p>

            <div class="instruction-divider"></div>

            <div class="instruction-row">
              <span>Follow the <strong>yellow path</strong> through the forest</span>
            </div>

            <div class="instruction-row">
              <div class="instruction-keys">
                <div class="instr-key-col"><kbd>W</kbd></div>
                <div class="instr-key-row"><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd></div>
              </div>
              <span>Move <strong>forward, back, left, and right</strong></span>
            </div>

            <div class="instruction-row">
              <span><strong>Click objects</strong> in the forest to explore</span>
            </div>

            <div class="instruction-enter">
              <kbd class="enter-key">Enter</kbd>
              <span>to begin your journey</span>
            </div>
          </div>
        </div>
      </div>

      <!-- MAIN PORTFOLIO SCENE -->
      <div id="main-scene" class="hidden">
        <canvas id="spline-forest"></canvas>
        <!-- BLUR OVERLAY — add right after spline-forest canvas -->
            <div id="scene-blur-overlay"></div>

        <nav id="forest-nav">
          <button class="nav-dot nav-home" id="nav-home-btn" type="button">
            <svg
              width="13"
              height="13"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z" />
              <path d="M9 21V12h6v9" />
            </svg>
            Home
          </button>

          <div class="nav-separator"></div>

          <button class="nav-dot" data-section="about" type="button">About Me</button>
          <button class="nav-dot" data-section="tools" type="button">Tools</button>
          <button class="nav-dot" data-section="portfolio" type="button">Portfolio</button>
          <button class="nav-dot" data-section="films" type="button">Short Films</button>
          <button class="nav-dot" data-section="resume" type="button">Resume</button>
          <button class="nav-dot" data-section="contact" type="button">Contact</button>
        </nav>

        <div id="mobile-nav">
          <button id="hamburger-btn" aria-label="Menu" aria-expanded="false" type="button">
            <span class="ham-line"></span>
            <span class="ham-line"></span>
            <span class="ham-line"></span>
            <span id="ham-label">Menu</span>
          </button>

          <div id="mobile-dropdown">
            <button class="mobile-nav-item mobile-home-item" id="mobile-home-btn" type="button">
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
              >
                <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z" />
                <path d="M9 21V12h6v9" />
              </svg>
              Home
            </button>

            <div class="mobile-nav-divider"></div>

            <button class="mobile-nav-item" data-section="about" type="button">About Me</button>
            <button class="mobile-nav-item" data-section="tools" type="button">Tools</button>
            <button class="mobile-nav-item" data-section="portfolio" type="button">Portfolio</button>
            <button class="mobile-nav-item" data-section="films" type="button">Short Films</button>
            <button class="mobile-nav-item" data-section="resume" type="button">Resume</button>
            <button class="mobile-nav-item" data-section="contact" type="button">Contact</button>
          </div>
        </div>

        <div class="wasd-hint desktop-only" id="main-wasd">
          <div class="wasd-row">
            <kbd>W</kbd>
          </div>
          <div class="wasd-row">
            <kbd>A</kbd><kbd>S</kbd><kbd>D</kbd>
          </div>
          <div class="wasd-labels">
            <span>Forward · Back · Left · Right</span>
          </div>
        </div>

        <div id="panel" class="hidden">
          <button id="panel-close" type="button"><img src="/images/Cross.png" style="width:100px;height:100px;object-fit:contain;" /></button>
          <div id="panel-content"></div>
        </div>

        <div id="project-overlay" class="hidden">
          <button id="project-close" type="button"><img src="/images/Cross.png" style="width:100px;height:100px;object-fit:contain;" /></button>
          <div id="project-layout">
            <button class="project-arrow" id="project-prev" type="button">←</button>
            <div id="project-left"><img id="project-img" src="" alt="" /></div>
            <div id="project-right">
              <p id="project-subtitle"></p>
              <h2 id="project-title"></h2>
              <div id="project-desc"></div>
            </div>
            <button class="project-arrow" id="project-next" type="button">→</button>
          </div>
        </div>

        <div id="filmstrip-overlay" class="hidden">
          <button id="filmstrip-close" type="button"><img src="/images/Cross.png" style="width:100px;height:100px;object-fit:contain;" /></button>
          <div id="filmstrip-layout">
            <div id="filmstrip-main"><img id="film-img" src="" alt="" /></div>
            <div id="filmstrip-info">
              <h2 id="film-title"></h2>
              <p id="film-counter"></p>
              <div id="filmstrip-controls">
                <button id="film-prev" type="button">←</button>
                <button id="film-visit" type="button">View Film</button>
                <button id="film-next" type="button">→</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
